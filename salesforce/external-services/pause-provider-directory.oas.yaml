openapi: 3.0.0
info:
  title: Pause Provider Directory
  version: "1.0.0"
  description: >
    Agentforce-facing slice of the Pause provider directory Experience API.
    Registered in Salesforce as an External Service so the
    Pause_Health_Intake_Agent can call findMenopauseProviders as an action
    when a patient asks to find a menopause specialist.

    This is a deliberately lean schema: the live endpoint returns more
    (meta, query echo, provenance), but External Services only maps the
    fields declared here into the agent's action output variables, so we
    declare only what the agent needs to answer the patient. Backed by the
    public, no-auth GET https://pause-health.ai/api/mulesoft/providers
    (served by provider_ingest's NPPES-derived directory, or the live
    MuleSoft Experience API when MULESOFT_PROVIDERS_BASE_URL is set).

# External Services uses the associated Named Credential (Pause_Provider_API)
# for the host; this server URL is informational. Paths are resolved relative
# to the Named Credential endpoint, so the path below must match the live route.
servers:
  - url: https://pause-health.ai

paths:
  /api/mulesoft/providers:
    get:
      operationId: findMenopauseProviders
      summary: Find menopause-certified providers
      description: >
        Returns menopause-relevant providers ranked by graph score. Pass
        zip to narrow to the patient's area (3-digit prefix match) and
        menopause=true to return only MSCP-credentialed clinicians.
      parameters:
        - name: zip
          in: query
          required: false
          description: Patient 5-digit ZIP. Narrows results to the local area.
          schema:
            type: string
        - name: menopause
          in: query
          required: false
          description: When true, return only menopause-certified (MSCP) providers.
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          description: Maximum number of providers to return (1-50).
          schema:
            type: integer
        - name: insurance
          in: query
          required: false
          description: >
            Insurance plan to narrow to in-network providers (e.g. aetna, bcbs,
            medicare). Accepts common synonyms ("Blue Cross" maps to bcbs).
            Omit to return providers regardless of accepted plans. The
            in-network signal is synthetically derived today (no public payer
            feed), so present it to the patient as a soft filter, not a
            guarantee.
          schema:
            type: string
        - name: telehealth
          in: query
          required: false
          description: >
            When true, narrow to providers that offer telehealth (useful when
            the patient asks specifically for a virtual/telehealth visit).
            Applied before the tier ladder. Omit to include in-person providers.
          schema:
            type: boolean
        - name: fallback
          in: query
          required: false
          description: >
            When true (the default) and menopause=true, a search with no
            certified provider in the ZIP area gracefully broadens to nearby
            menopause-relevant providers, then to telehealth-capable certified
            providers nationally. The tier that answered is reported in
            matchType. Pass false to force strict certified-only results.
          schema:
            type: boolean
      responses:
        "200":
          description: Provider directory results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total matching providers before the limit was applied.
                  returned:
                    type: integer
                    description: Number of providers in this response.
                  matchType:
                    type: string
                    description: >
                      Which search tier answered — read this and frame the
                      results honestly to the patient. One of:
                      certified-local (menopause-certified specialists in the
                      patient's ZIP area); relevant-local (no local CERTIFIED
                      provider, so nearby menopause-EXPERIENCED but non-certified
                      clinicians — say so); certified-remote (no local match, so
                      telehealth-capable certified specialists elsewhere);
                      certified-national (certified, no ZIP given); local / all
                      (general non-menopause browse); none (no match — point the
                      patient to The Menopause Society directory).
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        npi:
                          type: string
                          description: National Provider Identifier.
                        name:
                          type: string
                          description: Provider display name with credentials.
                        specialty:
                          type: string
                        menopauseCertified:
                          type: boolean
                        city:
                          type: string
                        state:
                          type: string
                        zip:
                          type: string
                        acceptingNewPatients:
                          type: boolean
                        telehealth:
                          type: boolean
                        graphScore:
                          type: number
                        distanceMiles:
                          type: number
                          description: >
                            Great-circle miles from the patient's ZIP centroid
                            when a ZIP was supplied and resolved; absent
                            otherwise. Say e.g. "about 4 miles away" when present.
                        serviceSignals:
                          type: array
                          description: >
                            Public-registry service-line signal tokens (e.g.
                            facog = board-certified OB/GYN, whnp = Women's Health
                            NP, multi-taxonomy = multi-specialty). Optional
                            supporting evidence for non-certified providers.
                          items:
                            type: string
                        insuranceAccepted:
                          type: array
                          description: >
                            Plans this provider accepts (synthetically derived
                            today — present as a soft signal, not a guarantee).
                          items:
                            type: string
