name: Lighthouse Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      url_override:
        description: "Optional URL to audit (overrides PROD_URL variable)."
        required: false
        type: string

concurrency:
  group: lighthouse-nightly
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: Audit live URL
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target URL
        id: target
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          URL_OVERRIDE: ${{ inputs.url_override }}
        run: |
          if [ -n "$URL_OVERRIDE" ]; then
            url="$URL_OVERRIDE"
          elif [ -n "$PROD_URL" ]; then
            url="$PROD_URL"
          else
            echo "::warning::PROD_URL repo variable is not set. Configure it in Settings → Secrets and variables → Actions → Variables."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          url="${url%/}"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "Target: $url"

      - name: Setup Node.js
        if: steps.target.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse
        if: steps.target.outputs.configured == 'true'
        run: npm install --global lighthouse@12

      - name: Run Lighthouse audits
        if: steps.target.outputs.configured == 'true'
        id: audit
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          set -euo pipefail
          mkdir -p lighthouse-history/runs
          date_dir=$(date -u +"%Y-%m-%d")
          run_dir="lighthouse-history/runs/$date_dir"
          mkdir -p "$run_dir"
          echo "RUN_DIR=$run_dir" >> "$GITHUB_ENV"

          paths=("/" "/about" "/proposal" "/demo/intake")
          for path in "${paths[@]}"; do
            slug=$(echo "$path" | sed 's|/|_|g; s|^_||; s|_$||')
            [ -z "$slug" ] && slug="root"
            url="$TARGET_URL$path"
            echo "Auditing $url"
            lighthouse "$url" \
              --output=json \
              --output-path="$run_dir/$slug.json" \
              --preset=desktop \
              --quiet \
              --chrome-flags="--headless=new --no-sandbox" \
              --only-categories=performance,accessibility,best-practices,seo
          done

      - name: Summarize results
        if: steps.target.outputs.configured == 'true'
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = require("path");
          const target = process.env.TARGET_URL;
          const runDir = process.env.RUN_DIR;
          const summaryPath = "lighthouse-history/summary.json";
          let history = [];
          if (fs.existsSync(summaryPath)) {
            try { history = JSON.parse(fs.readFileSync(summaryPath, "utf8")); } catch {}
          }
          const files = fs.readdirSync(runDir).filter(f => f.endsWith(".json"));
          const pages = files.map(file => {
            const data = JSON.parse(fs.readFileSync(path.join(runDir, file), "utf8"));
            const cat = data.categories || {};
            const round = c => (c && typeof c.score === "number") ? Math.round(c.score * 100) : null;
            return {
              page: data.finalDisplayedUrl || data.finalUrl || file,
              performance: round(cat.performance),
              accessibility: round(cat.accessibility),
              bestPractices: round(cat["best-practices"]),
              seo: round(cat.seo)
            };
          });
          const entry = {
            timestamp: new Date().toISOString(),
            target,
            commit: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            pages
          };
          history.push(entry);
          fs.writeFileSync(summaryPath, JSON.stringify(history, null, 2) + "\n");
          const md = [];
          md.push("# Lighthouse nightly summary");
          md.push("");
          md.push("Auto-generated by `.github/workflows/lighthouse-nightly.yml`.");
          md.push("");
          md.push(`Latest run: **${entry.timestamp}** against \`${target}\`.`);
          md.push("");
          md.push("| Page | Performance | Accessibility | Best Practices | SEO |");
          md.push("| --- | ---: | ---: | ---: | ---: |");
          for (const p of pages) {
            md.push(`| \`${p.page}\` | ${p.performance ?? "—"} | ${p.accessibility ?? "—"} | ${p.bestPractices ?? "—"} | ${p.seo ?? "—"} |`);
          }
          md.push("");
          md.push(`Total tracked runs: **${history.length}**. See \`summary.json\` for the full series and per-run JSON under \`runs/\`.`);
          fs.writeFileSync("lighthouse-history/README.md", md.join("\n") + "\n");
          console.log("Wrote summary for", pages.length, "pages.");
          EOF

      - name: Open or update PR with results
        if: steps.target.outputs.configured == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(lighthouse): nightly audit against ${{ steps.target.outputs.url }}"
          branch: lighthouse/nightly
          title: "chore(lighthouse): nightly audit results"
          body: |
            Automated nightly Lighthouse audit against `${{ steps.target.outputs.url }}`.

            See `lighthouse-history/README.md` for the latest summary table and
            `lighthouse-history/summary.json` for the full time series.

            Per-page JSON reports for this run are stored under
            `lighthouse-history/runs/`.
          add-paths: |
            lighthouse-history/**
          delete-branch: false
          labels: |
            lighthouse
            automated
