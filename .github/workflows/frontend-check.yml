name: Frontend Check

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-check.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-check.yml"

concurrency:
  group: frontend-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://pause-health.ai

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: |
            frontend/.next
            !frontend/.next/cache
          retention-days: 1

  lighthouse:
    name: Lighthouse Audit
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: frontend/.next

      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          NEXT_PUBLIC_SITE_URL: https://pause-health.ai
