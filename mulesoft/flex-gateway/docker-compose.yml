version: "3.9"

# Flex Gateway — Connected Mode (Docker + ngrok tunnel)
#
# Prerequisites (all one-time):
#   1. docker, docker compose, ngrok installed
#   2. ngrok authtoken configured: ngrok config add-authtoken <token>
#   3. Run the registration command from the runbook (Step 1) — it drops
#      registration.yaml into this directory via a docker run.
#
# Start (after registration.yaml exists):
#   docker compose up -d
#
# Stop:
#   docker compose down

services:
  flex-gateway:
    image: mulesoft/flex-gateway:latest
    container_name: flex-gateway
    volumes:
      # conf.d holds registration.yaml + any policy config files.
      # registration.yaml is generated by the docker run registration command (Step 1).
      # It contains org credentials — never commit it (.gitignore covers it).
      - .:/usr/local/share/mulesoft/flex-gateway/conf.d
    ports:
      - "8081:8081"  # Proxy listener — matches Anypoint's default port
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command: http --log=stdout --domain=cattail-reactive-sassy.ngrok-free.dev flex-gateway:8081
    ports:
      - "4040:4040"  # ngrok web UI — visit http://localhost:4040 to see the public URL
    depends_on:
      flex-gateway:
        condition: service_started
    restart: unless-stopped
