openapi: "3.0.3"

info:
  title: Pause Provider Experience API
  version: "1.0"
  description: |
    Experience API for the Pause Health platform. Exposes two endpoints:

    - `GET /health` — returns a FHIR R5 Bundle containing a demo patient timeline
      (vitals, HRV observations) sourced from the Pause MuleSoft CloudHub pipeline.
    - `GET /providers` — returns a filtered list of menopause-certified providers
      from the synthetic Pause provider directory.

    All requests must be authenticated with a JWT Bearer token issued by Auth0
    via the OAuth 2.0 client credentials grant. Requests are subject to a global
    rate limit of 10 req/min enforced by Flex Gateway.

servers:
  - url: https://cattail-reactive-sassy.ngrok-free.dev
    description: Flex Gateway (ngrok tunnel — development/demo)
  - url: https://pause-mulesoft-health-v1-zkeniz.scqos5-1.usa-w1.cloudhub.io
    description: CloudHub 2.0 worker (direct, bypasses gateway policies)

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealthBundle
      summary: Patient health timeline (FHIR R5 Bundle)
      description: |
        Returns a FHIR R5 Bundle of type `searchset` containing a demo patient
        record and associated observations (heart rate, HRV RMSSD) produced by
        the Pause MuleSoft ingest pipeline.
      responses:
        "200":
          description: FHIR R5 Bundle — patient timeline
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhirBundle"
              example:
                resourceType: Bundle
                type: searchset
                meta:
                  lastUpdated: "2026-06-09T06:24:07.324739034Z"
                  source: "urn:pause-health:mulesoft:pause-patient-bundle-process-api"
                entry:
                  - fullUrl: "urn:uuid:pause-demo-patient-001"
                    resource:
                      resourceType: Patient
                      id: pause-demo-patient-001
                      active: true
                      gender: female
                      birthDate: "1974-08-12"
                  - fullUrl: "urn:uuid:obs-heart-rate-001"
                    resource:
                      resourceType: Observation
                      id: obs-heart-rate-001
                      status: final
                      valueQuantity:
                        value: 72
                        unit: /min
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /providers:
    get:
      operationId: getProviders
      summary: Menopause-certified provider directory
      description: |
        Returns a filtered list of providers from the synthetic Pause provider
        directory.  Results can be filtered by ZIP code, menopause certification,
        and capped at a maximum count.
      parameters:
        - name: zip
          in: query
          description: Filter providers by ZIP code.
          required: false
          schema:
            type: string
            example: "90025"
        - name: menopause
          in: query
          description: When `true`, return only menopause-certified providers.
          required: false
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: Maximum number of providers to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: fallback
          in: query
          description: >
            When `true` (and `menopause=true`), a search with no certified
            provider in the ZIP area gracefully broadens — to nearby
            menopause-relevant (non-certified) providers, then to telehealth-capable
            certified providers nationally. The tier that answered is reported in
            `matchType`. Defaults to `true` on the Experience API.
          required: false
          schema:
            type: boolean
            default: true
        - name: distance
          in: query
          description: >
            When `true` (default) and the `zip` resolves to a Census ZCTA
            centroid, providers are ranked by Haversine distance ascending and
            each carries a `distanceMiles` field. Set to `false` to keep the
            prior `graphScore`-only ranking. The response `sort` field reports
            which ranking actually applied.
          required: false
          schema:
            type: boolean
            default: true
        - name: insurance
          in: query
          description: >
            Filter to providers whose `insuranceAccepted` list contains this
            plan. Case-insensitive; common synonyms are normalized
            ("United" → "uhc", "Blue Cross" → "bcbs"). Applied BEFORE the
            tier ladder so all tiers honor it consistently. Unknown plan
            tokens yield zero results — honest no-match rather than silent
            no-op. Note: `insuranceAccepted` is synthetically derived
            per-NPI today; see the Provider schema for the full caveat.
          required: false
          schema:
            type: string
            example: aetna
      responses:
        "200":
          description: Provider directory results
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDirectoryResponse"
              example:
                query:
                  zip: "92614"
                  menopauseOnly: true
                  limit: 3
                  fallback: false
                  insurance: null
                matchType: certified-local
                sort: score
                total: 1
                returned: 1
                providers:
                  - npi: "1730155570"
                    name: "Dr. Priya Anand, MD, FACOG, MSCP"
                    credentials: [MD, FACOG, MSCP]
                    specialty: "Obstetrics & Gynecology"
                    menopauseCertified: true
                    city: Irvine
                    state: CA
                    zip: "92614"
                    acceptingNewPatients: false
                    telehealth: false
                    graphScore: 0.7624
                    latitude: 33.68021
                    longitude: -117.833355
                    serviceSignals: [facog]
                    licenseStatus: active
                    insuranceAccepted: [medicare, medicaid, aetna, cigna]
                    distanceMiles: null
                provenance:
                  sources:
                    - "CMS NPPES (taxonomy-filtered slice baked into MuleSoft worker)"
                    - "Self-reported MSCP/NCMP credentials + curated overlay"
                    - "Insurance acceptance is synthetically derived per-NPI (no public payer feed; replace with a real partner feed when available)"
                  experienceApi: "pause-provider-directory-experience-api@0.9"
                  servedBy: mulesoft-cloudhub2
                  dataset:
                    generatedAt: null
                    sourceDate: null
                    total: 9
                    certified: 7
                    states: 4
                    zip3Prefixes: 7
                    sanctionedFiltered: 0
                    sanctionedFilteredBySource: {}
                    sanctionsOverlaysUsed: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Auth0 M2M JWT token. Obtain via the OAuth 2.0 client credentials grant
        against `https://dev-2z72o4qxi3yym4kh.us.auth0.com/oauth/token` with
        audience `https://cattail-reactive-sassy.ngrok-free.dev`.

  headers:
    RateLimitLimit:
      description: Maximum requests allowed in the current window.
      schema:
        type: integer
        example: 10
    RateLimitRemaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
        example: 9
    RateLimitReset:
      description: Milliseconds until the rate limit window resets.
      schema:
        type: integer
        example: 52034

  responses:
    Unauthorized:
      description: Missing or invalid client credentials.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Authentication Attempt Failed
    TooManyRequests:
      description: Rate limit exceeded for the current SLA tier.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Quota exceeded

  schemas:
    FhirBundle:
      type: object
      required: [resourceType, type, entry]
      properties:
        resourceType:
          type: string
          enum: [Bundle]
        type:
          type: string
          example: searchset
        meta:
          type: object
          properties:
            lastUpdated:
              type: string
              format: date-time
            source:
              type: string
        entry:
          type: array
          items:
            $ref: "#/components/schemas/FhirBundleEntry"

    FhirBundleEntry:
      type: object
      properties:
        fullUrl:
          type: string
          example: "urn:uuid:pause-demo-patient-001"
        resource:
          type: object
          required: [resourceType]
          properties:
            resourceType:
              type: string
              example: Patient

    Provider:
      type: object
      required: [npi, name, specialty, menopauseCertified, city, state, zip, acceptingNewPatients, telehealth, graphScore]
      properties:
        npi:
          type: string
          description: National Provider Identifier
          example: "1245319599"
        name:
          type: string
          example: "Dr. Priya Nair, MD, MSCP"
        credentials:
          type: array
          items:
            type: string
          example: [MD, MSCP]
        specialty:
          type: string
          example: "Obstetrics & Gynecology"
        menopauseCertified:
          type: boolean
        city:
          type: string
          example: Irvine
        state:
          type: string
          example: CA
        zip:
          type: string
          example: "92614"
        acceptingNewPatients:
          type: boolean
        telehealth:
          type: boolean
        graphScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Provider relevance score from the Pause knowledge graph.
          example: 0.95
        latitude:
          type: number
          format: float
          nullable: true
          description: >
            Latitude of the practice ZIP centroid (Census 2020 ZCTA). Null if
            the ZIP has no ZCTA centroid (rare PO-box-only / very new ZIPs).
          example: 33.68
        longitude:
          type: number
          format: float
          nullable: true
          description: Longitude of the practice ZIP centroid (Census 2020 ZCTA).
          example: -117.83
        distanceMiles:
          type: number
          format: float
          nullable: true
          description: >
            Great-circle distance in miles from the patient ZIP centroid to the
            practice ZIP centroid (Haversine). Present only when both centroids
            are known and `distance=true`; otherwise null.
          example: 4.2
        serviceSignals:
          type: array
          description: >
            Public-registry tokens detected in NPPES that suggest the provider
            actually delivers menopause-relevant care. Examples include
            `facog` (board-certified OB/GYN), `faafp` (board-certified family
            physician), `whnp` (Women's Health NP), `cnm` (Certified Nurse-
            Midwife), `multi-taxonomy` (provider lists ≥2 menopause-relevant
            NUCC codes). Used to honestly sub-rank the relevant-local tier;
            empty array when no signals matched.
          items:
            type: string
            example: facog
          example: [facog, multi-taxonomy]
        licenseStatus:
          type: string
          description: >
            Disposition against published state sanction overlays. Survivors
            of the build always carry `active` — sanctioned providers are
            filtered out at build time so the directory never recommends one.
            See `provenance.dataset.providers.sanctionedFiltered` for the
            count of providers filtered by sanctions in the most recent build.
          enum: [active, suspended, probation]
          default: active
          example: active
        insuranceAccepted:
          type: array
          description: >
            Plans the provider accepts. **Synthesized today** — derived
            deterministically per-NPI by `provider_ingest/insurance.py`
            because no public payer/in-network feed is available. The
            **shape** is real (so the API contract, the `?insurance=`
            filter UX, and the agent framing are real) and a paid data
            partnership can replace the derivation later without changes
            downstream. Canonical tokens: `medicare`, `medicaid`, `aetna`,
            `bcbs`, `uhc`, `cigna`, `humana`, `kaiser`. Always non-empty
            (Medicare is the conservative floor).
          items:
            type: string
            example: aetna
          example: [medicare, aetna, bcbs]

    ProviderDirectoryResponse:
      type: object
      required: [query, total, returned, providers]
      properties:
        query:
          type: object
          properties:
            zip:
              type: string
              nullable: true
            menopauseOnly:
              type: boolean
            limit:
              type: integer
            fallback:
              type: boolean
            insurance:
              type: string
              nullable: true
              description: >
                Canonical insurance plan token applied to the filter, or
                null when no filter was requested. Reflects the result of
                synonym normalization (e.g. "United" → "uhc"), so it
                may differ from what the caller passed.
        sort:
          type: string
          description: >
            Which ranking actually applied. `distance` when the patient ZIP
            centroid was known and at least one provider had a centroid;
            `score` otherwise (graphScore desc).
          enum:
            - distance
            - score
        matchType:
          type: string
          description: >
            Which search tier answered, so callers can present results honestly.
            `certified-local`: certified provider(s) in the ZIP area.
            `relevant-local`: no local certified provider, so nearby
            menopause-relevant but NON-certified providers (present as
            menopause-experienced, not certified). `certified-remote`: no local
            match, so telehealth-capable certified specialists nationally.
            `certified-national`: certified, no ZIP filter. `local`/`all`: general
            (non-menopause) browse. `none`: no match.
          enum:
            - certified-local
            - relevant-local
            - certified-remote
            - certified-national
            - local
            - all
            - none
        total:
          type: integer
          description: Total matching providers before limit applied.
        returned:
          type: integer
          description: Number of providers in this response.
        providers:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        provenance:
          type: object
          properties:
            sources:
              type: array
              items:
                type: string
            experienceApi:
              type: string
            servedBy:
              type: string
            dataset:
              type: object
              nullable: true
              description: >
                Build metadata for the directory backing this response. Null
                when the directory is the curated fallback (no national run
                committed). `sourceDate` is the dataset's freshness (CMS NPPES
                dissemination zip mtime); `generatedAt` is the wall-clock
                build time.
              properties:
                generatedAt:
                  type: string
                  format: date-time
                  nullable: true
                sourceDate:
                  type: string
                  format: date-time
                  nullable: true
                total:
                  type: integer
                certified:
                  type: integer
                states:
                  type: integer
                zip3Prefixes:
                  type: integer
                sanctionedFiltered:
                  type: integer
                  description: >
                    Total count of provider candidates dropped by ANY
                    sanctions overlay during the most recent build. Zero is
                    the healthy default; the field exists so consumers can
                    confirm the safety filter actually ran. The per-source
                    breakdown rides on `sanctionedFilteredBySource`.
                  example: 0
                sanctionedFilteredBySource:
                  type: object
                  additionalProperties:
                    type: integer
                  description: >
                    Per-source breakdown of sanctioned drops, e.g.
                    `{"ca": 588, "ny": 849, "tx": 283}`. Keys: `ca`
                    (Medi-Cal Suspended & Ineligible — NPI-keyed), `ny`
                    (NY Professional Medical Conduct Board Actions —
                    license-number-keyed via the NPPES `Provider License
                    Number_<i>` cross-walk), `tx` (Texas Medical Board
                    All-Licenses — license-number-keyed, allowlist of
                    active-sanction dispositions). New states land
                    additively as new keys.
                  example:
                    ca: 588
                    ny: 849
                    tx: 283
                sanctionsOverlaysUsed:
                  type: object
                  additionalProperties:
                    type: string
                    nullable: true
                  description: >
                    Per-source overlay file path that contributed to this
                    build, or null if the source wasn't applied. Mirrors
                    `sanctionedFilteredBySource` so a reader can correlate
                    each drop count with the overlay file that produced it.
